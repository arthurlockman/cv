<!DOCTYPE html>
<html lang="{{ locale.language_iso_639_1 }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Arthur Rosa - Resume</title>
    <meta name="description" content="Resume for Arthur Rosa, engineering leader focused on AI products, marketplace systems, platform engineering, and high-performing teams.">
    <meta name="author" content="Arthur Rosa">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Arthur Rosa - Resume">
    <meta property="og:description" content="Engineering leader focused on AI products, marketplace systems, platform engineering, and high-performing teams.">
    <meta name="twitter:card" content="summary">
    <link rel="stylesheet" media="(prefers-color-scheme: light)"
        href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-light.min.css"
        integrity="sha512-Pmhg2i/F7+5+7SsdoUqKeH7UAZoVMYb1sxGOoJ0jWXAEHP0XV2H4CITyK267eHWp2jpj7rtqWNkmEOw1tNyYpg=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" media="(prefers-color-scheme: dark)"
        href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-dark.min.css"
        integrity="sha512-MmL2FuLmm/UH05Ah4JiJwA+G7OCceZDpzGHWqsju4Espzq+9nwQJdQVMNZPd1FNK2H3qDYXdET7HNG7Qm93FEg=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        :root {
            color-scheme: light dark;
            --page-background: #f6f8fa;
            --content-background: #ffffff;
            --content-border: #d8dee4;
            --avatar-shadow: rgba(31, 35, 40, 0.12);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --page-background: #010409;
                --content-background: #0d1117;
                --content-border: #30363d;
                --avatar-shadow: rgba(0, 0, 0, 0.35);
            }
        }

        body {
            margin: 0;
            background: var(--page-background);
        }

        .markdown-body {
            box-sizing: border-box;
            max-width: 920px;
            margin: 32px auto;
            padding: 48px;
            background: var(--content-background);
            border: 1px solid var(--content-border);
            border-radius: 12px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
        }

        .markdown-body > h1:first-of-type {
            display: none;
        }

        .markdown-body a {
            text-underline-offset: 0.15em;
        }

        .site-header {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 24px;
            align-items: center;
            padding-bottom: 24px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--content-border);
        }

        .markdown-body .site-title {
            margin: 0;
            padding-bottom: 0;
            border-bottom: 0;
            font-size: clamp(2.1rem, 6vw, 3rem);
            font-weight: 600;
            line-height: 1.2;
        }

        .resume-actions {
            margin: 0;
        }

        .site-avatar {
            width: 80px;
            height: 80px;
            border: 1px solid var(--content-border);
            border-radius: 22%;
            box-shadow: 0 8px 24px var(--avatar-shadow);
            object-fit: cover;
        }

        .pdf-download {
            display: inline-flex;
            align-items: center;
            gap: 0.35em;
            padding: 0.55em 0.85em;
            border: 1px solid var(--content-border);
            border-radius: 999px;
            color: inherit;
            font-size: 0.9em;
            font-weight: 600;
            line-height: 1;
            text-decoration: none;
        }

        .pdf-download:hover {
            text-decoration: none;
            background: var(--page-background);
        }

        @media (max-width: 767px) {
            body {
                background: var(--content-background);
            }

            .markdown-body {
                min-width: 0;
                margin: 0;
                padding: 20px;
                border: 0;
            border-radius: 0;
            }

            .site-header {
                grid-template-columns: auto minmax(0, 1fr);
                gap: 14px;
                padding-bottom: 18px;
                margin-bottom: 18px;
            }

            .resume-actions {
                grid-column: 1 / -1;
                margin-top: 2px;
            }

            .site-avatar {
                width: 72px;
                height: 72px;
            }

            .site-title {
                font-size: clamp(2rem, 12vw, 2.7rem);
            }
        }
    </style>
</head>

<body>
    <article class="markdown-body">
        <header class="site-header">
            <img class="site-avatar" src="https://www.gravatar.com/avatar/75852bd5adfd7fb80e02fa45dee070f0?s=160&d=mp" alt="Arthur Rosa">
            <h1 class="site-title">Arthur Rosa</h1>
            <nav class="resume-actions" aria-label="Resume actions">
                <a class="pdf-download" href="/arthur-rosa-resume.pdf" download>Download PDF</a>
            </nav>
        </header>
        {{ html_body|indent(8) }}
    </article>
</body>

</html>
